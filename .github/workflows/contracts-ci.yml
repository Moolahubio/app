name: contracts-ci

# Build + test the Foundry contracts and run Slither static analysis on every
# pull request and on pushes to main that touch contracts/. Dependencies are
# cloned at pinned tags into lib/ (which is gitignored), matching foundry.toml.

on:
  push:
    branches: [main]
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"
  pull_request:
    paths:
      - "contracts/**"
      - ".github/workflows/contracts-ci.yml"

permissions:
  contents: read

concurrency:
  group: contracts-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  OZ_TAG: v5.1.0
  FORGE_STD_TAG: v1.9.4

jobs:
  test:
    name: Build & test (forge)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies (pinned)
        run: |
          git clone --depth 1 --branch "$OZ_TAG" https://github.com/OpenZeppelin/openzeppelin-contracts lib/openzeppelin-contracts
          git clone --depth 1 --branch "$FORGE_STD_TAG" https://github.com/foundry-rs/forge-std lib/forge-std

      - name: Build
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

      - name: Format check (informational)
        run: forge fmt --check
        continue-on-error: true

  slither:
    name: Static analysis (Slither)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies (pinned)
        run: |
          git clone --depth 1 --branch "$OZ_TAG" https://github.com/OpenZeppelin/openzeppelin-contracts contracts/lib/openzeppelin-contracts
          git clone --depth 1 --branch "$FORGE_STD_TAG" https://github.com/foundry-rs/forge-std contracts/lib/forge-std

      - name: Run Slither
        id: slither
        uses: crytic/slither-action@v0.4.0
        with:
          target: "contracts/"
          slither-args: '--filter-paths "lib/|test/|script/"'
          fail-on: high
          sarif: results.sarif

      - name: Upload SARIF to code scanning
        if: always() && steps.slither.outputs.sarif != ''
        uses: github/codeql-action/upload-sarif@v3
        continue-on-error: true
        with:
          sarif_file: ${{ steps.slither.outputs.sarif }}
