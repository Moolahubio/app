version: 2
# The old root package-lock.json was removed in the npm -> pnpm migration, which
# left Dependabot's historical alerts pointing at a manifest that no longer
# exists. This config points Dependabot at the real pnpm workspace lockfile (the
# "npm" ecosystem covers pnpm-lock.yaml) plus the GitHub Actions workflows.
# Minor/patch bumps are grouped to keep PR noise low.
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
