# Local / single-host production-like stack: Postgres + the MoolaHub app.
#
#   APP_ENCRYPTION_KEY=$(openssl rand -hex 32) SESSION_SECRET=$(openssl rand -hex 32) \
#     docker compose up --build
#   docker compose exec app npm run db:seed      # one-time demo data
#
# App: http://localhost:3000   (demo login: ama@moolahub.io / moolahub)

services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: moolahub
      POSTGRES_PASSWORD: moolahub
      POSTGRES_DB: moolahub
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U moolahub -d moolahub"]
      interval: 5s
      timeout: 5s
      retries: 15

  app:
    build: .
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://moolahub:moolahub@db:5432/moolahub?schema=public
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:?set APP_ENCRYPTION_KEY (openssl rand -hex 32)}
      SESSION_SECRET: ${SESSION_SECRET:?set SESSION_SECRET (openssl rand -hex 32)}
      BASE_NETWORK: ${BASE_NETWORK:-sepolia}
      BASE_RPC_URL: ${BASE_RPC_URL:-https://sepolia.base.org}
      USDC_CONTRACT_ADDRESS: ${USDC_CONTRACT_ADDRESS:-0x036CbD53842c5426634e7929541eC2318f3dCF7e}
      BASE_EXPLORER_URL: ${BASE_EXPLORER_URL:-https://sepolia.basescan.org}
      PLATFORM_PRIVATE_KEY: ${PLATFORM_PRIVATE_KEY:-}
      NEXT_PUBLIC_ONCHAINKIT_API_KEY: ${NEXT_PUBLIC_ONCHAINKIT_API_KEY:-}
      NEXT_PUBLIC_BASE_CHAIN: ${NEXT_PUBLIC_BASE_CHAIN:-baseSepolia}
      NEXT_PUBLIC_BASE_ACCOUNT: ${NEXT_PUBLIC_BASE_ACCOUNT:-false}
      NEXT_PUBLIC_BASE_RPC_URL: ${NEXT_PUBLIC_BASE_RPC_URL:-https://sepolia.base.org}
      NEXT_PUBLIC_USDC_ADDRESS: ${NEXT_PUBLIC_USDC_ADDRESS:-0x036CbD53842c5426634e7929541eC2318f3dCF7e}
      NEXT_PUBLIC_CDP_PROJECT_ID: ${NEXT_PUBLIC_CDP_PROJECT_ID:-}
      PAYMASTER_SERVICE_URL: ${PAYMASTER_SERVICE_URL:-}
    ports:
      - "3000:3000"

volumes:
  pgdata:
