openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MoolaHub API — social savings platform on Base blockchain
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: wallet
    description: Wallet operations
  - name: circles
    description: Susu circle operations
  - name: goals
    description: Savings goal operations
  - name: learn
    description: Financial education operations
  - name: activity
    description: Activity feed operations
  - name: notifications
    description: Notification operations
  - name: profile
    description: User profile operations
  - name: dashboard
    description: Dashboard summary operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: passkeys
    description: WebAuthn passkey registration and login
  - name: operations
    description: Operator/admin read-only observability

paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys:
    get:
      tags: [passkeys]
      operationId: listPasskeys
      summary: List the current user's passkeys
      responses:
        "200":
          description: Passkeys for the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/{id}:
    delete:
      tags: [passkeys]
      operationId: deletePasskey
      summary: Remove a passkey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/register/options:
    post:
      tags: [passkeys]
      operationId: registerPasskeyOptions
      summary: Begin passkey registration (returns WebAuthn creation options)
      responses:
        "200":
          description: Registration options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyChallengeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/register/verify:
    post:
      tags: [passkeys]
      operationId: registerPasskeyVerify
      summary: Complete passkey registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegisterVerifyInput"
      responses:
        "200":
          description: Registered passkey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeySummary"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/login/options:
    post:
      tags: [passkeys]
      operationId: loginPasskeyOptions
      summary: Begin passkey login (returns WebAuthn request options)
      responses:
        "200":
          description: Login options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyChallengeResponse"

  /passkeys/login/verify:
    post:
      tags: [passkeys]
      operationId: loginPasskeyVerify
      summary: Complete passkey login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginVerifyInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- Auth ----
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/privy:
    post:
      operationId: privyAuth
      tags: [auth]
      summary: Authenticate with Privy token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivyAuthInput"
      responses:
        "200":
          description: Logged in via Privy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  # ---- Dashboard ----
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (balances, totals, stats)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ---- Wallet ----
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet info and balance
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"

  /wallet/deposit:
    post:
      operationId: depositFaucet
      tags: [wallet]
      summary: Testnet faucet deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountInput"
      responses:
        "200":
          description: Deposit submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/withdraw:
    post:
      operationId: withdrawFunds
      tags: [wallet]
      summary: Withdraw USDC to external Base address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "200":
          description: Withdrawal submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/sync:
    post:
      operationId: syncDeposits
      tags: [wallet]
      summary: Sync on-chain deposits
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  # ---- Circles ----
  /circles:
    get:
      operationId: listCircles
      tags: [circles]
      summary: List user's circles
      responses:
        "200":
          description: List of circles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircleSummary"
    post:
      operationId: createCircle
      tags: [circles]
      summary: Create a new Susu circle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CircleInput"
      responses:
        "201":
          description: Circle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleSummary"

  /circles/invites:
    get:
      operationId: listInvites
      tags: [circles]
      summary: List pending circle invites
      responses:
        "200":
          description: List of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircleInvite"

  /circles/{id}:
    get:
      operationId: getCircle
      tags: [circles]
      summary: Get circle details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Circle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /circles/{id}/invite:
    post:
      operationId: inviteToCircle
      tags: [circles]
      summary: Invite member to circle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "200":
          description: Invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/{id}/start:
    post:
      operationId: startCircle
      tags: [circles]
      summary: Start the circle (lock in members and begin rounds)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Circle started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/{id}/contribute:
    post:
      operationId: contributeToCircle
      tags: [circles]
      summary: Make a contribution to the circle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/invites/{id}/accept:
    post:
      operationId: acceptInvite
      tags: [circles]
      summary: Accept a circle invite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/invites/{id}/decline:
    post:
      operationId: declineInvite
      tags: [circles]
      summary: Decline a circle invite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Goals ----
  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List user's savings goals
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get goal details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Goal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /goals/{id}/allocate:
    post:
      operationId: allocateToGoal
      tags: [goals]
      summary: Allocate funds to a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountInput"
      responses:
        "200":
          description: Allocated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /goals/{id}/release:
    post:
      operationId: releaseFromGoal
      tags: [goals]
      summary: Release funds from a goal back to wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountInput"
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseFromGoalResult"

  /goals/{id}/delete:
    post:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal, auto-withdrawing all funds (net of the 2% fee)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGoalResult"
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ---- Learn ----
  /learn/lessons:
    get:
      operationId: listLessons
      tags: [learn]
      summary: List all lessons with completion status
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LessonSummary"

  /learn/lessons/{slug}:
    get:
      operationId: getLesson
      tags: [learn]
      summary: Get lesson content and completion status
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /learn/lessons/{slug}/complete:
    post:
      operationId: completeLesson
      tags: [learn]
      summary: Mark lesson as completed
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Activity ----
  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List transaction activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ---- Notifications ----
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
    delete:
      operationId: clearNotifications
      tags: [notifications]
      summary: Clear all notifications
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Profile ----
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /operations/settlements:
    get:
      tags: [operations]
      operationId: getSettlementOverview
      summary: Operator view of the on-chain settlement queue and platform wallet funding
      description: >-
        Read-only snapshot of the onchain_transfers queue grouped by status, plus
        the platform distributor wallet's ETH/USDC balance. Requires an operator
        token via the `x-operator-token` header (matching the OPERATOR_TOKEN
        secret).
      responses:
        "200":
          description: Settlement queue overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementOverviewResponse"
        "401":
          description: Missing or invalid operator token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Operator console not configured (OPERATOR_TOKEN unset)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    # ---- Auth ----
    PrivyAuthInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        rememberMe:
          type: boolean
          description: When true, the session lasts 30 days instead of the 7-day default.

    AuthUser:
      type: object
      required: [id, name, email, hasWallet]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        hasWallet:
          type: boolean
        walletAddress:
          type: ["string", "null"]

    # ---- Dashboard ----
    DashboardSummary:
      type: object
      required: [availableCents, totalCents, goalTotalCents, circlePotCents, recentActivity, activeGoals, activeCircles, lessonsCompleted, totalLessons, yieldApy]
      properties:
        availableCents:
          type: integer
        totalCents:
          type: integer
        goalTotalCents:
          type: integer
        circlePotCents:
          type: integer
        yieldApy:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        activeGoals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"
        activeCircles:
          type: array
          items:
            $ref: "#/components/schemas/CircleSummary"
        lessonsCompleted:
          type: integer
        totalLessons:
          type: integer
        upcomingReminder:
          $ref: "#/components/schemas/Reminder"

    Reminder:
      type: object
      required: [title, amountCents, dueDate]
      properties:
        title:
          type: string
        amountCents:
          type: integer
        dueDate:
          type: string

    # ---- Wallet ----
    WalletInfo:
      type: object
      required: [availableCents, totalCents, goalAllocatedCents, address, network, onchainEnabled]
      properties:
        availableCents:
          type: integer
        totalCents:
          type: integer
        goalAllocatedCents:
          type: integer
        address:
          type: string
        network:
          type: string
        onchainEnabled:
          type: boolean

    AmountInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer

    WithdrawInput:
      type: object
      required: [amountCents, destination]
      properties:
        amountCents:
          type: integer
        destination:
          type: string

    SyncResult:
      type: object
      required: [ok, credited]
      properties:
        ok:
          type: boolean
        credited:
          type: integer
        totalCents:
          type: integer

    # ---- Circles ----
    CircleSummary:
      type: object
      required: [id, name, status, type, frequency, contributionCents, payoutCents, potCents, memberCount, myPayoutRound, currentRound, totalRounds]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        type:
          type: string
        frequency:
          type: string
        contributionCents:
          type: integer
        payoutCents:
          type: integer
        potCents:
          type: integer
        memberCount:
          type: integer
        myPayoutRound:
          type: integer
        currentRound:
          type: integer
        totalRounds:
          type: integer
        nextPayoutDate:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    CircleDetail:
      type: object
      required: [id, name, status, type, frequency, contributionCents, payoutCents, potCents, currentRound, totalRounds, startDate, members]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        type:
          type: string
        frequency:
          type: string
        contributionCents:
          type: integer
        payoutCents:
          type: integer
        potCents:
          type: integer
        memberCount:
          type: integer
        currentRound:
          type: integer
        totalRounds:
          type: integer
        startDate:
          type: ["string", "null"]
        contractAddress:
          type: ["string", "null"]
        feeBps:
          type: integer
        explorerUrl:
          type: ["string", "null"]
        members:
          type: array
          items:
            $ref: "#/components/schemas/CircleMember"
        history:
          type: array
          items:
            $ref: "#/components/schemas/CircleContribution"
        myContributionStatus:
          type: ["string", "null"]
        myPayoutRound:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        isCreator:
          type: boolean
        canInvite:
          type: boolean
        canStart:
          type: boolean
        canContribute:
          type: boolean
        pendingInvites:
          type: array
          items:
            $ref: "#/components/schemas/CirclePendingInvite"

    CirclePendingInvite:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string

    CircleMember:
      type: object
      required: [id, name, payoutRound, state, paidOut]
      properties:
        id:
          type: string
        name:
          type: string
        position:
          type: integer
        payoutRound:
          type: integer
        state:
          type: string
        paidOut:
          type: boolean
        contributedThisRound:
          type: boolean

    CircleContribution:
      type: object
      required: [id, round, amountCents, status, createdAt]
      properties:
        id:
          type: string
        round:
          type: integer
        amountCents:
          type: integer
        txHash:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    CircleInvite:
      type: object
      required: [id, circleName, inviterName, contributionCents, frequency]
      properties:
        id:
          type: string
        circleName:
          type: string
        inviterName:
          type: string
        contributionCents:
          type: integer
        frequency:
          type: string

    CircleInput:
      type: object
      required: [name, contributionCents, frequency, memberEmails]
      properties:
        name:
          type: string
        type:
          type: string
        contributionCents:
          type: integer
        numRounds:
          type: integer
        frequency:
          type: string
        memberEmails:
          type: array
          items:
            type: string
        imageUrl:
          type: string

    InviteInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    # ---- Goals ----
    Goal:
      type: object
      required: [id, name, emoji, color, targetCents, savedCents, deadline, frequency, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        color:
          type: string
        targetCents:
          type: integer
        savedCents:
          type: integer
        deadline:
          type: string
        frequency:
          type: string
        autoSaveCents:
          type: ["integer", "null"]
        createdAt:
          type: string
        imageUrl:
          type: ["string", "null"]
        onchain:
          type: boolean
        vaultAddress:
          type: ["string", "null"]
        explorerUrl:
          type: ["string", "null"]
        network:
          type: ["string", "null"]
        feeBps:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/GoalHistoryItem"

    GoalHistoryItem:
      type: object
      required: [id, type, amountCents, onchainStatus, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        amountCents:
          type: integer
        txHash:
          type: ["string", "null"]
        onchainStatus:
          type: string
        createdAt:
          type: string

    ReleaseFromGoalResult:
      type: object
      required: [ok, grossCents, netCents, feeCents]
      properties:
        ok:
          type: boolean
        grossCents:
          type: integer
        netCents:
          type: integer
        feeCents:
          type: integer

    DeleteGoalResult:
      type: object
      required: [ok, withdrawnGrossCents, withdrawnNetCents, feeCents]
      properties:
        ok:
          type: boolean
        withdrawnGrossCents:
          type: integer
        withdrawnNetCents:
          type: integer
        feeCents:
          type: integer

    GoalInput:
      type: object
      required: [name, targetCents, deadline]
      properties:
        name:
          type: string
        emoji:
          type: string
        color:
          type: string
        targetCents:
          type: integer
        deadline:
          type: string
        frequency:
          type: string
        autoSaveCents:
          type: ["integer", "null"]
        imageUrl:
          type: string

    # ---- Learn ----
    LessonSummary:
      type: object
      required: [slug, title, summary, minutes, level, category, emoji, completed]
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        minutes:
          type: integer
        level:
          type: string
        category:
          type: string
        emoji:
          type: string
        completed:
          type: boolean

    LessonBody:
      type: object
      required: [heading, text]
      properties:
        heading:
          type: string
        text:
          type: string

    LessonDetail:
      type: object
      required: [slug, title, summary, minutes, level, category, emoji, completed, body, takeaways]
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        minutes:
          type: integer
        level:
          type: string
        category:
          type: string
        emoji:
          type: string
        completed:
          type: boolean
        body:
          type: array
          items:
            $ref: "#/components/schemas/LessonBody"
        takeaways:
          type: array
          items:
            type: string

    # ---- Activity ----
    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        amountCents:
          type: ["integer", "null"]
        txHash:
          type: ["string", "null"]
        onchainStatus:
          type: string
        createdAt:
          type: string

    # ---- Notifications ----
    Notification:
      type: object
      required: [id, type, title, body, read, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        link:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string

    NotificationsResponse:
      type: object
      required: [notifications, unreadCount]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer

    # ---- Profile ----
    UserProfile:
      type: object
      required: [id, name, email, walletAddress, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        avatarUrl:
          type: ["string", "null"]
        walletAddress:
          type: ["string", "null"]
        createdAt:
          type: string

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        avatarUrl:
          type: ["string", "null"]

    # ---- Storage ----
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          format: uri
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    # ---- Passkeys ----
    PasskeyChallengeResponse:
      type: object
      required: [flowId, options]
      properties:
        flowId:
          type: string
        options:
          type: object
          additionalProperties: true
    PasskeyRegisterVerifyInput:
      type: object
      required: [flowId, response]
      properties:
        flowId:
          type: string
        deviceName:
          type: ["string", "null"]
        response:
          type: object
          additionalProperties: true
    PasskeyLoginVerifyInput:
      type: object
      required: [flowId, response]
      properties:
        flowId:
          type: string
        response:
          type: object
          additionalProperties: true
    PasskeySummary:
      type: object
      required: [id, deviceName, createdAt, lastUsedAt]
      properties:
        id:
          type: string
        deviceName:
          type: ["string", "null"]
        createdAt:
          type: string
        lastUsedAt:
          type: ["string", "null"]
    PasskeyListResponse:
      type: object
      required: [passkeys]
      properties:
        passkeys:
          type: array
          items:
            $ref: "#/components/schemas/PasskeySummary"

    # ---- Operations ----
    PlatformBalances:
      type: object
      required: [address, ethWei, ethFormatted, usdcCents, reachable]
      properties:
        address:
          type: ["string", "null"]
        ethWei:
          type: ["string", "null"]
        ethFormatted:
          type: ["string", "null"]
        usdcCents:
          type: ["integer", "null"]
        reachable:
          type: boolean
    SettlementTransfer:
      type: object
      required:
        [id, kind, amountCents, attempts, status, toAddress, memo, lastError, txHash, lastAttemptAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        kind:
          type: string
        amountCents:
          type: integer
        attempts:
          type: integer
        status:
          type: string
        toAddress:
          type: string
        memo:
          type: ["string", "null"]
        lastError:
          type: ["string", "null"]
        txHash:
          type: ["string", "null"]
        lastAttemptAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    SettlementStatusGroup:
      type: object
      required: [status, count, totalAmountCents, transfers]
      properties:
        status:
          type: string
        count:
          type: integer
        totalAmountCents:
          type: integer
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/SettlementTransfer"
    SettlementOverviewResponse:
      type: object
      required: [onchainEnabled, maxAttempts, rowLimit, truncated, platform, groups]
      properties:
        onchainEnabled:
          type: boolean
        maxAttempts:
          type: integer
        rowLimit:
          type: integer
        truncated:
          type: boolean
        platform:
          $ref: "#/components/schemas/PlatformBalances"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/SettlementStatusGroup"
