openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: MoolaHub API — social savings platform on Monad blockchain
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: wallet
    description: Wallet operations
  - name: circles
    description: Susu circle operations
  - name: goals
    description: Savings goal operations
  - name: learn
    description: Financial education operations
  - name: activity
    description: Activity feed operations
  - name: notifications
    description: Notification operations
  - name: profile
    description: User profile operations
  - name: dashboard
    description: Dashboard summary operations
  - name: storage
    description: Object storage upload and serving endpoints
  - name: passkeys
    description: WebAuthn passkey registration and login
  - name: operations
    description: Operator/admin read-only observability
  - name: streaks
    description: Savings streak operations

paths:
  /storage/uploads/request-url:
    post:
      tags: [storage]
      operationId: requestUploadUrl
      summary: Request a presigned URL for file upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned upload URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"
        "400":
          description: Missing or invalid required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys:
    get:
      tags: [passkeys]
      operationId: listPasskeys
      summary: List the current user's passkeys
      responses:
        "200":
          description: Passkeys for the user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/{id}:
    delete:
      tags: [passkeys]
      operationId: deletePasskey
      summary: Remove a passkey
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Removed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/register/options:
    post:
      tags: [passkeys]
      operationId: registerPasskeyOptions
      summary: Begin passkey registration (returns WebAuthn creation options)
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterPasskeyOptionsInput"
      responses:
        "200":
          description: Registration options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyChallengeResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/register/verify:
    post:
      tags: [passkeys]
      operationId: registerPasskeyVerify
      summary: Complete passkey registration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyRegisterVerifyInput"
      responses:
        "200":
          description: Registered passkey
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeySummary"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /passkeys/login/options:
    post:
      tags: [passkeys]
      operationId: loginPasskeyOptions
      summary: Begin passkey login (returns WebAuthn request options)
      responses:
        "200":
          description: Login options
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PasskeyChallengeResponse"

  /passkeys/login/verify:
    post:
      tags: [passkeys]
      operationId: loginPasskeyVerify
      summary: Complete passkey login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PasskeyLoginVerifyInput"
      responses:
        "200":
          description: Logged in (or a 2FA challenge when the account requires it)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          description: Verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ---- Auth ----
  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/privy:
    post:
      operationId: privyAuth
      tags: [auth]
      summary: Authenticate with Privy token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivyAuthInput"
      responses:
        "200":
          description: Logged in via Privy (or a 2FA challenge when the account requires it)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"

  /auth/2fa/login:
    post:
      operationId: twoFactorLogin
      tags: [auth]
      summary: Complete login by verifying a 2FA code (TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorLoginInput"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Create an account with email + password (sends an email verification code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterInput"
      responses:
        "200":
          description: Account created; email verification required
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmailVerificationRequired"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: Email or username already in use
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Sign in with email + password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginInput"
      responses:
        "200":
          description: >-
            Logged in, OR a 2FA challenge, OR email verification required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "401":
          description: Invalid email or password
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/verify-email:
    post:
      operationId: verifyEmail
      tags: [auth]
      summary: Confirm an email verification code and establish a session
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/VerifyEmailInput"
      responses:
        "200":
          description: Verified and logged in (or a 2FA challenge)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResult"
        "400":
          description: Invalid or expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/resend-code:
    post:
      operationId: resendVerificationCode
      tags: [auth]
      summary: Resend the email verification code for an unverified account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResendCodeInput"
      responses:
        "200":
          description: If the account exists and is unverified, a code was sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/stepup/request-code:
    post:
      operationId: requestStepUpCode
      tags: [auth]
      summary: >-
        Request an emailed confirmation code to prove account ownership before
        enrolling a new durable login method, for accounts with neither a
        password nor 2FA enabled.
      responses:
        "200":
          description: Code sent (if applicable)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Account already has a password or 2FA — use that instead
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/forgot-password:
    post:
      operationId: forgotPassword
      tags: [auth]
      summary: Request a password reset code by email
      description: >-
        Always returns ok and never reveals whether an account exists. If a
        matching password account is found, a single-use, time-limited reset code
        is emailed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordInput"
      responses:
        "200":
          description: If a matching account exists, a reset code was sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /auth/reset-password:
    post:
      operationId: resetPassword
      tags: [auth]
      summary: Reset a forgotten password with an emailed code
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordInput"
      responses:
        "200":
          description: Password reset; the new password can now be used to sign in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid request, or an invalid/expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/username-available:
    get:
      operationId: usernameAvailable
      tags: [auth]
      summary: Check whether a public username is available
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Availability result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UsernameAvailability"

  /auth/privy/link:
    post:
      operationId: linkPrivy
      tags: [auth]
      summary: Link a Privy wallet/identity to the signed-in account (optional)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PrivyLinkInput"
      responses:
        "200":
          description: Linked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "400":
          description: Invalid request or token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "409":
          description: This Privy identity is already linked to another account
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /auth/password:
    post:
      operationId: changePassword
      tags: [auth]
      summary: Set or change the account password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangePasswordInput"
      responses:
        "200":
          description: Password updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "401":
          description: Current password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ---- Security (2FA) ----
  /security/2fa:
    get:
      operationId: getTwoFactorStatus
      tags: [security]
      summary: Get authenticator-app 2FA status
      responses:
        "200":
          description: 2FA status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorStatus"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /security/2fa/setup:
    post:
      operationId: setupTwoFactor
      tags: [security]
      summary: Begin 2FA setup (returns secret + QR to scan)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepUpProofInput"
      responses:
        "200":
          description: Setup material
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TwoFactorSetup"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /security/2fa/enable:
    post:
      operationId: enableTwoFactor
      tags: [security]
      summary: Confirm a code to enable 2FA (returns one-time backup codes)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorEnableInput"
      responses:
        "200":
          description: Enabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodes"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /security/2fa/disable:
    post:
      operationId: disableTwoFactor
      tags: [security]
      summary: Disable 2FA (requires a current TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeInput"
      responses:
        "200":
          description: Disabled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /security/2fa/backup-codes:
    post:
      operationId: regenerateBackupCodes
      tags: [security]
      summary: Regenerate backup codes (requires a current TOTP or backup code)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TwoFactorCodeInput"
      responses:
        "200":
          description: New backup codes
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BackupCodes"
        "400":
          description: Invalid code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ---- Account ----
  /account/deactivate:
    post:
      operationId: deactivateAccount
      tags: [account]
      summary: Deactivate the account (reversible; signs the user out)
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepUpProofInput"
      responses:
        "200":
          description: Deactivated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /account:
    delete:
      operationId: deleteAccount
      tags: [account]
      summary: Permanently delete the account (clears personal data, revokes access)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteAccountInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "409":
          description: Cannot delete while funds or active commitments remain
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ---- Dashboard ----
  /dashboard/summary:
    get:
      operationId: getDashboardSummary
      tags: [dashboard]
      summary: Get dashboard summary (balances, totals, stats)
      responses:
        "200":
          description: Dashboard summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  # ---- Wallet ----
  /wallet:
    get:
      operationId: getWallet
      tags: [wallet]
      summary: Get wallet info and balance
      responses:
        "200":
          description: Wallet info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WalletInfo"

  /wallet/deposit:
    post:
      operationId: depositFaucet
      tags: [wallet]
      summary: Testnet faucet deposit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountInput"
      responses:
        "200":
          description: Deposit submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/withdraw:
    post:
      operationId: withdrawFunds
      tags: [wallet]
      summary: Withdraw USDC to external Monad address
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WithdrawInput"
      responses:
        "200":
          description: Withdrawal submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/sync:
    post:
      operationId: syncDeposits
      tags: [wallet]
      summary: Sync on-chain deposits
      responses:
        "200":
          description: Sync result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncResult"

  /wallet/withdraw/submitted:
    post:
      operationId: confirmWithdrawal
      tags: [wallet]
      summary: Confirm a client-signed (non-custodial) withdrawal after broadcast
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmWithdrawalInput"
      responses:
        "200":
          description: Withdrawal confirmed and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /wallet/ensure-gas:
    post:
      operationId: ensureWalletGas
      tags: [wallet]
      summary: Top up gas (MON) on a non-custodial wallet before it signs
      responses:
        "200":
          description: Gas ensured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Refer & Earn ----
  /referral:
    get:
      operationId: getReferralOverview
      tags: [referral]
      summary: Get the user's Refer & Earn code, tier, earnings and referrals
      responses:
        "200":
          description: Referral overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferralOverview"

  /referral/withdraw:
    post:
      operationId: withdrawReferralEarnings
      tags: [referral]
      summary: Withdraw available referral earnings (step-up required)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReferralWithdrawInput"
      responses:
        "200":
          description: Withdrawal submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Circles ----
  /circles:
    get:
      operationId: listCircles
      tags: [circles]
      summary: List user's circles
      responses:
        "200":
          description: List of circles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircleSummary"
    post:
      operationId: createCircle
      tags: [circles]
      summary: Create a new Susu circle
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CircleInput"
      responses:
        "201":
          description: Circle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleSummary"

  /circles/invites:
    get:
      operationId: listInvites
      tags: [circles]
      summary: List pending circle invites
      responses:
        "200":
          description: List of invites
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CircleInvite"

  /circles/{id}:
    get:
      operationId: getCircle
      tags: [circles]
      summary: Get circle details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Circle details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CircleDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /circles/{id}/invite:
    post:
      operationId: inviteToCircle
      tags: [circles]
      summary: Invite member to circle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteInput"
      responses:
        "200":
          description: Invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/{id}/start:
    post:
      operationId: startCircle
      tags: [circles]
      summary: Start the circle (lock in members and begin rounds)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Circle started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/{id}/delete:
    post:
      operationId: deleteCircle
      tags: [circles]
      summary: Delete an idle circle (creator only, before anyone else joins)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /circles/{id}/contribute:
    post:
      operationId: contributeToCircle
      tags: [circles]
      summary: Make a contribution to the circle
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Contribution recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/{id}/contribute/submitted:
    post:
      operationId: confirmContribution
      tags: [circles]
      summary: Confirm a client-signed (non-custodial) contribution after broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmContributionInput"
      responses:
        "200":
          description: Contribution confirmed and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/invites/{id}/accept:
    post:
      operationId: acceptInvite
      tags: [circles]
      summary: Accept a circle invite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /circles/invites/{id}/decline:
    post:
      operationId: declineInvite
      tags: [circles]
      summary: Decline a circle invite
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Declined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Goals ----
  /goals:
    get:
      operationId: listGoals
      tags: [goals]
      summary: List user's savings goals
      responses:
        "200":
          description: List of goals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Goal"
    post:
      operationId: createGoal
      tags: [goals]
      summary: Create a savings goal
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoalInput"
      responses:
        "201":
          description: Goal created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"

  /goals/{id}:
    get:
      operationId: getGoal
      tags: [goals]
      summary: Get goal details
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Goal details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Goal"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /goals/{id}/allocate:
    post:
      operationId: allocateToGoal
      tags: [goals]
      summary: Allocate funds to a goal
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AmountInput"
      responses:
        "200":
          description: Allocated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /goals/{id}/release:
    post:
      operationId: releaseFromGoal
      tags: [goals]
      summary: Release funds from a goal back to wallet
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReleaseFromGoalInput"
      responses:
        "200":
          description: Released
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseFromGoalResult"

  /goals/{id}/deposit/submitted:
    post:
      operationId: confirmGoalDeposit
      tags: [goals]
      summary: Confirm a client-signed (non-custodial) goal deposit after broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmGoalDepositInput"
      responses:
        "200":
          description: Deposit confirmed and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /goals/{id}/release/submitted:
    post:
      operationId: confirmGoalRelease
      tags: [goals]
      summary: Confirm a client-signed (non-custodial) goal withdrawal after broadcast
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ConfirmGoalReleaseInput"
      responses:
        "200":
          description: Withdrawal confirmed and recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReleaseFromGoalResult"

  /goals/{id}/delete:
    post:
      operationId: deleteGoal
      tags: [goals]
      summary: Delete a goal, auto-withdrawing all funds (net of the 2% fee)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StepUpProofInput"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteGoalResult"
        "400":
          description: Delete failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  # ---- Learn ----
  /learn/lessons:
    get:
      operationId: listLessons
      tags: [learn]
      summary: List all lessons with completion status
      responses:
        "200":
          description: List of lessons
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/LessonSummary"

  /learn/lessons/{slug}:
    get:
      operationId: getLesson
      tags: [learn]
      summary: Get lesson content and completion status
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LessonDetail"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /learn/lessons/{slug}/complete:
    post:
      operationId: completeLesson
      tags: [learn]
      summary: Mark lesson as completed
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Lesson marked complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Activity ----
  /activity:
    get:
      operationId: listActivity
      tags: [activity]
      summary: List transaction activity feed
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Activity list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ActivityItem"

  # ---- Notifications ----
  /notifications:
    get:
      operationId: listNotifications
      tags: [notifications]
      summary: List notifications
      responses:
        "200":
          description: Notifications
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationsResponse"
    delete:
      operationId: clearNotifications
      tags: [notifications]
      summary: Clear all notifications
      responses:
        "200":
          description: Cleared
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/preferences:
    get:
      operationId: getNotificationPreferences
      tags: [notifications]
      summary: Get notification preferences
      responses:
        "200":
          description: Notification preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"
    patch:
      operationId: updateNotificationPreferences
      tags: [notifications]
      summary: Update notification preferences
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NotificationPreferencesUpdate"
      responses:
        "200":
          description: Updated preferences
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NotificationPreferences"

  /notifications/read-all:
    post:
      operationId: markAllNotificationsRead
      tags: [notifications]
      summary: Mark all notifications as read
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  /notifications/{id}/read:
    post:
      operationId: markNotificationRead
      tags: [notifications]
      summary: Mark a single notification as read
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Marked read
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"

  # ---- Profile ----
  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    patch:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /operations/settlements:
    get:
      tags: [operations]
      operationId: getSettlementOverview
      summary: Operator view of the on-chain settlement queue and platform wallet funding
      description: >-
        Read-only snapshot of the onchain_transfers queue grouped by status, plus
        the platform distributor wallet's ETH/USDC balance. Requires an operator
        token via the `x-operator-token` header (matching the OPERATOR_TOKEN
        secret).
      responses:
        "200":
          description: Settlement queue overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SettlementOverviewResponse"
        "401":
          description: Missing or invalid operator token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
        "503":
          description: Operator console not configured (OPERATOR_TOKEN unset)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /streaks:
    get:
      operationId: getStreaks
      tags: [streaks]
      summary: Get the user's savings streak overview
      responses:
        "200":
          description: Streak overview
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakOverview"

  /streaks/reminders:
    post:
      operationId: setStreakReminders
      tags: [streaks]
      summary: Opt in or out of streak reminders
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreakReminderInput"
      responses:
        "200":
          description: Updated reminder preference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakReminderResponse"

  /streaks/frequency:
    post:
      operationId: setStreakFrequency
      tags: [streaks]
      summary: Change how often a deposit must happen to keep the streak alive
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreakFrequencyInput"
      responses:
        "200":
          description: Streak overview after the frequency change
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakOverview"
        "400":
          description: Invalid frequency or already changed this calendar year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /streaks/vacation:
    post:
      operationId: startStreakVacation
      tags: [streaks]
      summary: Start the annual streak vacation (pauses streaks without breaking them)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StreakVacationInput"
      responses:
        "200":
          description: Streak overview after starting vacation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakOverview"
        "400":
          description: Invalid request or vacation already used this year
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /streaks/vacation/end:
    post:
      operationId: endStreakVacation
      tags: [streaks]
      summary: End the active streak vacation early
      responses:
        "200":
          description: Streak overview after ending vacation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StreakOverview"

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: string

    OkResponse:
      type: object
      required: [ok]
      properties:
        ok:
          type: boolean

    # ---- Refer & Earn ----
    ReferralTierInfo:
      type: object
      required: [key, rateBps, minActive]
      properties:
        key:
          type: string
          description: One of starter | builder | connector | leader | champion.
        rateBps:
          type: integer
          description: Current earn rate in basis points (1000 = 10%).
        minActive:
          type: integer
          description: Active-saver count at which this tier begins.
        nextTierKey:
          type: ["string", "null"]
        nextTierRateBps:
          type: ["integer", "null"]
        nextTierAtActive:
          type: ["integer", "null"]
          description: Active savers needed to reach the next tier.

    ReferralWithdrawalLimits:
      type: object
      required:
        [
          minCents,
          maxMonthlyCents,
          withdrawnThisMonthCents,
          remainingThisMonthCents,
          hasWallet,
        ]
      properties:
        minCents:
          type: integer
        maxMonthlyCents:
          type: integer
        withdrawnThisMonthCents:
          type: integer
        remainingThisMonthCents:
          type: integer
        hasWallet:
          type: boolean

    ReferralReferee:
      type: object
      required: [name, joinedAt, status, activityCount, feesEarnedCents]
      properties:
        name:
          type: string
        username:
          type: ["string", "null"]
        joinedAt:
          type: string
        status:
          type: string
          description: One of active | inactive | pending.
        activityCount:
          type: integer
          description: Non-monetary activity signal (current savings-streak length).
        feesEarnedCents:
          type: integer
          description: Commission you earned from this member (your own data).

    ReferralOverview:
      type: object
      required:
        [
          code,
          link,
          tier,
          activeReferrals,
          totalReferred,
          pendingCents,
          availableCents,
          lifetimeCents,
          withdrawal,
          referrals,
        ]
      properties:
        code:
          type: string
        link:
          type: string
        tier:
          $ref: "#/components/schemas/ReferralTierInfo"
        activeReferrals:
          type: integer
        totalReferred:
          type: integer
        pendingCents:
          type: integer
        availableCents:
          type: integer
        lifetimeCents:
          type: integer
        withdrawal:
          $ref: "#/components/schemas/ReferralWithdrawalLimits"
        referrals:
          type: array
          items:
            $ref: "#/components/schemas/ReferralReferee"

    ReferralWithdrawInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    # ---- Streaks ----
    StreakHero:
      type: object
      required: [count, status, commitmentName, emoji]
      properties:
        count:
          type: integer
        status:
          type: string
        commitmentName:
          type: ["string", "null"]
        emoji:
          type: ["string", "null"]

    StreakCommitment:
      type: object
      required: [id, commitmentType, commitmentId, commitmentName, emoji, frequency, currentCount, bestCount, status, currentPeriodEnd, currentPeriodSatisfied]
      properties:
        id:
          type: string
        commitmentType:
          type: string
        commitmentId:
          type: string
        commitmentName:
          type: string
        emoji:
          type: ["string", "null"]
        frequency:
          type: string
        currentCount:
          type: integer
        bestCount:
          type: integer
        status:
          type: string
        currentPeriodEnd:
          type: string
        currentPeriodSatisfied:
          type: boolean

    StreakBadge:
      type: object
      required: [badgeKey, year, quarterIndex, earnedAt]
      properties:
        badgeKey:
          type: string
        year:
          type: integer
        quarterIndex:
          type: integer
        earnedAt:
          type: string

    StreakFreezes:
      type: object
      required: [balance, usedTotal]
      properties:
        balance:
          type: integer
        usedTotal:
          type: integer

    StreakVacation:
      type: object
      required: [active, start, end, usedThisYear]
      properties:
        active:
          type: boolean
        start:
          type: ["string", "null"]
        end:
          type: ["string", "null"]
        usedThisYear:
          type: boolean

    StreakBadgeProgress:
      type: object
      required: [earnedQuarters, nextTier, pct, daysToNext]
      properties:
        earnedQuarters:
          type: integer
        nextTier:
          type: string
          enum: [bronze, silver, gold]
        pct:
          type: number
        daysToNext:
          type: ["integer", "null"]

    StreakOverview:
      type: object
      required:
        [
          hero,
          frequency,
          canChangeFrequency,
          nextChangeYear,
          currentPeriodEnd,
          currentPeriodSatisfied,
          atRisk,
          lifetimeBest,
          totalPeriodsSaved,
          commitments,
          freezes,
          badges,
          badgeProgress,
          reminderOptIn,
          vacation,
        ]
      properties:
        hero:
          oneOf:
            - $ref: "#/components/schemas/StreakHero"
            - type: "null"
        frequency:
          type: string
          enum: [daily, weekly, monthly]
        canChangeFrequency:
          type: boolean
        nextChangeYear:
          type: ["integer", "null"]
        currentPeriodEnd:
          type: ["string", "null"]
        currentPeriodSatisfied:
          type: boolean
        atRisk:
          type: boolean
        lifetimeBest:
          type: integer
        totalPeriodsSaved:
          type: integer
        commitments:
          type: array
          items:
            $ref: "#/components/schemas/StreakCommitment"
        freezes:
          $ref: "#/components/schemas/StreakFreezes"
        badges:
          type: array
          items:
            $ref: "#/components/schemas/StreakBadge"
        badgeProgress:
          $ref: "#/components/schemas/StreakBadgeProgress"
        reminderOptIn:
          type: boolean
        vacation:
          $ref: "#/components/schemas/StreakVacation"

    StreakFrequencyInput:
      type: object
      required: [frequency]
      properties:
        frequency:
          type: string
          enum: [daily, weekly, monthly]

    StreakReminderInput:
      type: object
      required: [optIn]
      properties:
        optIn:
          type: boolean

    StreakReminderResponse:
      type: object
      required: [optIn]
      properties:
        optIn:
          type: boolean

    StreakVacationInput:
      type: object
      required: [days]
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 30

    # ---- Auth ----
    PrivyAuthInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        rememberMe:
          type: boolean
          description: When true, the session lasts 30 days instead of the 7-day default.

    AuthUser:
      type: object
      required: [id, name, email, hasWallet]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        username:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        hasWallet:
          type: boolean
        walletAddress:
          type: ["string", "null"]
        hasPassword:
          type: boolean
          description: Whether the account has an email/password credential set.
        privyLinked:
          type: boolean
          description: Whether a Privy identity is linked to this account.
        emailVerified:
          type: boolean
        language:
          type: string
          description: Preferred UI language code (e.g. "en", "ar", "fr", "sw", "pcm", "ha", "zh").

    LoginResult:
      type: object
      required: [twoFactorRequired]
      description: >-
        Result of a primary-auth login. When the account has 2FA enabled, only
        `twoFactorRequired` + `challengeId` are returned and the caller must
        complete /auth/2fa/login. When the account's email is unverified,
        `emailVerificationRequired` is true. Otherwise the authenticated user is
        returned.
      properties:
        twoFactorRequired:
          type: boolean
        challengeId:
          type: ["string", "null"]
        emailVerificationRequired:
          type: ["boolean", "null"]
        id:
          type: ["string", "null"]
        name:
          type: ["string", "null"]
        email:
          type: ["string", "null"]
        username:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        hasWallet:
          type: ["boolean", "null"]
        walletAddress:
          type: ["string", "null"]
        hasPassword:
          type: ["boolean", "null"]
        privyLinked:
          type: ["boolean", "null"]

    RegisterInput:
      type: object
      required: [name, username, email, password, dateOfBirth]
      properties:
        name:
          type: string
          description: Legal name (private).
        username:
          type: string
          description: Public handle, 3–30 chars of letters, numbers, underscores.
        email:
          type: string
        password:
          type: string
          minLength: 8
        dateOfBirth:
          type: string
          description: ISO date (YYYY-MM-DD); must be in the past.
        referralSource:
          type: ["string", "null"]
          description: One of Twitter | Telegram | WhatsApp | Discord | LinkedIn | Friends | Others.
        referralCode:
          type: ["string", "null"]
          description: >-
            Optional Refer & Earn code (from a friend's invite link
            /register?ref=CODE). Invalid or self codes are ignored silently and
            never block sign-up.
        rememberMe:
          type: boolean

    LoginInput:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string
        rememberMe:
          type: boolean

    VerifyEmailInput:
      type: object
      required: [email, code]
      properties:
        email:
          type: string
        code:
          type: string
          description: The 6-digit verification code.
        rememberMe:
          type: boolean

    ResendCodeInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ForgotPasswordInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    ResetPasswordInput:
      type: object
      required: [email, code, newPassword]
      properties:
        email:
          type: string
        code:
          type: string
          description: The 6-digit reset code emailed to the account.
        newPassword:
          type: string
          minLength: 8

    EmailVerificationRequired:
      type: object
      required: [emailVerificationRequired, email]
      properties:
        emailVerificationRequired:
          type: boolean
        email:
          type: string

    UsernameAvailability:
      type: object
      required: [available]
      properties:
        available:
          type: boolean
        reason:
          type: ["string", "null"]

    PrivyLinkInput:
      type: object
      required: [token]
      properties:
        token:
          type: string
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    ChangePasswordInput:
      type: object
      required: [newPassword]
      properties:
        currentPassword:
          type: ["string", "null"]
          description: >-
            Required when the account already has a password set. If the
            account ALSO has 2FA enabled, twoFactorCode is required as well —
            the current password alone is not sufficient step-up proof.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (in addition to currentPassword, if set) when the
            account has TOTP 2FA enabled.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required when the account has neither a password nor 2FA (first
            password on a legacy passwordless account). Obtain via
            POST /auth/stepup/request-code.
        newPassword:
          type: string
          minLength: 8

    TwoFactorLoginInput:
      type: object
      required: [challengeId, code]
      properties:
        challengeId:
          type: string
        code:
          type: string
          description: A 6-digit TOTP code or a backup code.

    TwoFactorStatus:
      type: object
      required: [enabled, backupCodesRemaining]
      properties:
        enabled:
          type: boolean
        backupCodesRemaining:
          type: integer

    TwoFactorSetup:
      type: object
      required: [secret, otpauthUrl, qrDataUrl]
      properties:
        secret:
          type: string
          description: Base32 secret to type into an authenticator app manually.
        otpauthUrl:
          type: string
        qrDataUrl:
          type: string
          description: PNG data URL of the QR code to scan.

    TwoFactorCodeInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: A 6-digit TOTP code or a backup code.

    TwoFactorEnableInput:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: A 6-digit TOTP code from the secret returned by setup.
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has no password (and no 2FA
            yet, since this call is what enables it). Obtain via
            POST /auth/stepup/request-code.

    BackupCodes:
      type: object
      required: [backupCodes]
      properties:
        backupCodes:
          type: array
          items:
            type: string

    DeleteAccountInput:
      type: object
      required: [confirm]
      properties:
        confirm:
          type: string
          description: Must equal "DELETE" to confirm.
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    StepUpProofInput:
      type: object
      properties:
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    NotificationPreferences:
      type: object
      required: [preference, categories]
      properties:
        preference:
          type: string
          description: One of everything | essential | minimal | custom.
        categories:
          $ref: "#/components/schemas/NotificationCategories"

    NotificationCategories:
      type: object
      required: [money, social, engagement]
      properties:
        money:
          type: boolean
        social:
          type: boolean
        engagement:
          type: boolean

    NotificationPreferencesUpdate:
      type: object
      required: [preference]
      properties:
        preference:
          type: string
        categories:
          $ref: "#/components/schemas/NotificationCategories"

    # ---- Dashboard ----
    DashboardSummary:
      type: object
      required: [availableCents, totalCents, goalTotalCents, circlePotCents, recentActivity, activeGoals, activeCircles, lessonsCompleted, totalLessons, yieldApy]
      properties:
        availableCents:
          type: integer
        totalCents:
          type: integer
        goalTotalCents:
          type: integer
        pendingCents:
          type: integer
          description: On-chain wallet outflows still settling (not yet reflected on-chain).
        balanceUnavailable:
          type: boolean
          description: True when an on-chain balance read failed, so displayed figures may be understated.
        circlePotCents:
          type: integer
        yieldApy:
          type: number
        recentActivity:
          type: array
          items:
            $ref: "#/components/schemas/ActivityItem"
        activeGoals:
          type: array
          items:
            $ref: "#/components/schemas/Goal"
        activeCircles:
          type: array
          items:
            $ref: "#/components/schemas/CircleSummary"
        lessonsCompleted:
          type: integer
        totalLessons:
          type: integer
        upcomingReminder:
          $ref: "#/components/schemas/Reminder"

    Reminder:
      type: object
      required: [title, amountCents, dueDate]
      properties:
        title:
          type: string
        amountCents:
          type: integer
        dueDate:
          type: string

    # ---- Wallet ----
    WalletInfo:
      type: object
      required: [availableCents, totalCents, goalAllocatedCents, network, onchainEnabled, hasWallet, faucetEnabled, syncEnabled]
      properties:
        availableCents:
          type: integer
        totalCents:
          type: integer
        goalAllocatedCents:
          type: integer
        pendingCents:
          type: integer
          description: On-chain wallet outflows still settling (not yet reflected on-chain).
        balanceUnavailable:
          type: boolean
          description: True when an on-chain balance read failed, so displayed figures may be understated.
        address:
          type: ["string", "null"]
          description: The user's Monad wallet address, or null when no wallet has been set up yet.
        network:
          type: string
        onchainEnabled:
          type: boolean
        hasWallet:
          type: boolean
          description: Whether the user has provisioned a wallet (via "Continue with Privy").
        faucetEnabled:
          type: boolean
          description: Whether the testnet faucet is available on this deployment.
        syncEnabled:
          type: boolean
          description: Whether on-chain deposit sync is available on this deployment.
        custody:
          type: ["string", "null"]
          description: >-
            Wallet key custody: 'server' (legacy custodial — the platform signs),
            'privy' (non-custodial — the user signs withdrawals on their device),
            or null when no wallet has been set up yet.
        usdcAddress:
          type: ["string", "null"]
          description: >-
            The USDC ERC-20 contract address on this network, so a non-custodial
            (client-signed) withdrawal knows which token to transfer. Null when
            on-chain isn't configured.

    AmountInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer

    WithdrawInput:
      type: object
      required: [amountCents, destination]
      properties:
        amountCents:
          type: integer
        destination:
          type: string
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    ConfirmWithdrawalInput:
      type: object
      required: [txHash, amountCents, destination]
      properties:
        txHash:
          type: string
          description: Hash of the user-signed USDC transfer already broadcast on-chain.
        amountCents:
          type: integer
        destination:
          type: string
          description: The external address the user sent USDC to.

    ConfirmGoalDepositInput:
      type: object
      required: [txHash, amountCents]
      properties:
        txHash:
          type: string
          description: Hash of the user-signed goal-vault deposit already broadcast on-chain.
        amountCents:
          type: integer

    ConfirmGoalReleaseInput:
      type: object
      required: [txHash, amountCents]
      properties:
        txHash:
          type: string
          description: Hash of the user-signed goal-vault withdrawal already broadcast on-chain.
        amountCents:
          type: integer
          description: The gross amount withdrawn (before the on-chain fee).

    ConfirmContributionInput:
      type: object
      required: [txHash]
      properties:
        txHash:
          type: string
          description: Hash of the user-signed contribution already broadcast on-chain.

    ReleaseFromGoalInput:
      type: object
      required: [amountCents]
      properties:
        amountCents:
          type: integer
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.

    SyncResult:
      type: object
      required: [ok, credited]
      properties:
        ok:
          type: boolean
        credited:
          type: integer
        totalCents:
          type: integer

    # ---- Circles ----
    CircleSummary:
      type: object
      required: [id, name, status, type, frequency, contributionCents, payoutCents, potCents, memberCount, myPayoutRound, currentRound, totalRounds]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        type:
          type: string
        frequency:
          type: string
        contributionCents:
          type: integer
        payoutCents:
          type: integer
        potCents:
          type: integer
        memberCount:
          type: integer
        targetMembers:
          type: ["integer", "null"]
        feeBps:
          type: integer
        myPayoutRound:
          type: integer
        currentRound:
          type: integer
        totalRounds:
          type: integer
        nextPayoutDate:
          type: ["string", "null"]
        imageUrl:
          type: ["string", "null"]

    CircleDetail:
      type: object
      required: [id, name, status, type, frequency, contributionCents, payoutCents, potCents, currentRound, totalRounds, startDate, members]
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
        type:
          type: string
        frequency:
          type: string
        contributionCents:
          type: integer
        payoutCents:
          type: integer
        potCents:
          type: integer
        memberCount:
          type: integer
        targetMembers:
          type: ["integer", "null"]
        currentRound:
          type: integer
        totalRounds:
          type: integer
        startDate:
          type: ["string", "null"]
        contractAddress:
          type: ["string", "null"]
        feeBps:
          type: integer
        explorerUrl:
          type: ["string", "null"]
        members:
          type: array
          items:
            $ref: "#/components/schemas/CircleMember"
        history:
          type: array
          items:
            $ref: "#/components/schemas/CircleContribution"
        myContributionStatus:
          type: ["string", "null"]
        myPayoutRound:
          type: ["integer", "null"]
        imageUrl:
          type: ["string", "null"]
        isCreator:
          type: boolean
        canInvite:
          type: boolean
        canStart:
          type: boolean
        canDelete:
          type: boolean
        canContribute:
          type: boolean
        pendingInvites:
          type: array
          items:
            $ref: "#/components/schemas/CirclePendingInvite"

    CirclePendingInvite:
      type: object
      required: [id, email]
      properties:
        id:
          type: string
        email:
          type: string

    CircleMember:
      type: object
      required: [id, name, payoutRound, state, paidOut]
      properties:
        id:
          type: string
        name:
          type: string
        position:
          type: integer
        payoutRound:
          type: integer
        state:
          type: string
        paidOut:
          type: boolean
        contributedThisRound:
          type: boolean

    CircleContribution:
      type: object
      required: [id, round, amountCents, status, createdAt]
      properties:
        id:
          type: string
        round:
          type: integer
        amountCents:
          type: integer
        txHash:
          type: ["string", "null"]
        status:
          type: string
        createdAt:
          type: string

    CircleInvite:
      type: object
      required: [id, circleName, inviterName, contributionCents, frequency]
      properties:
        id:
          type: string
        circleName:
          type: string
        inviterName:
          type: string
        contributionCents:
          type: integer
        frequency:
          type: string

    CircleInput:
      type: object
      required: [name, frequency, memberEmails]
      properties:
        name:
          type: string
        type:
          type: string
        contributionCents:
          type: integer
        numRounds:
          type: integer
        targetPayoutCents:
          type: integer
        groupSize:
          type: integer
        frequency:
          type: string
        memberEmails:
          type: array
          maxItems: 19
          items:
            type: string
        imageUrl:
          type: string

    InviteInput:
      type: object
      required: [email]
      properties:
        email:
          type: string

    # ---- Goals ----
    Goal:
      type: object
      required: [id, name, emoji, color, targetCents, savedCents, deadline, frequency, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        emoji:
          type: string
        color:
          type: string
        targetCents:
          type: integer
        savedCents:
          type: integer
        balanceUnavailable:
          type: boolean
          description: True when this goal's on-chain vault balance read failed, so savedCents may be understated.
        deadline:
          type: string
        frequency:
          type: string
        autoSaveCents:
          type: ["integer", "null"]
        createdAt:
          type: string
        imageUrl:
          type: ["string", "null"]
        onchain:
          type: boolean
        vaultAddress:
          type: ["string", "null"]
        explorerUrl:
          type: ["string", "null"]
        network:
          type: ["string", "null"]
        feeBps:
          type: integer
        history:
          type: array
          items:
            $ref: "#/components/schemas/GoalHistoryItem"

    GoalHistoryItem:
      type: object
      required: [id, type, amountCents, onchainStatus, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        amountCents:
          type: integer
        txHash:
          type: ["string", "null"]
        onchainStatus:
          type: string
        createdAt:
          type: string

    ReleaseFromGoalResult:
      type: object
      required: [ok, grossCents, netCents, feeCents]
      properties:
        ok:
          type: boolean
        grossCents:
          type: integer
        netCents:
          type: integer
        feeCents:
          type: integer

    DeleteGoalResult:
      type: object
      required: [ok, withdrawnGrossCents, withdrawnNetCents, feeCents]
      properties:
        ok:
          type: boolean
        withdrawnGrossCents:
          type: integer
        withdrawnNetCents:
          type: integer
        feeCents:
          type: integer

    GoalInput:
      type: object
      required: [name, targetCents, deadline]
      properties:
        name:
          type: string
        emoji:
          type: string
        color:
          type: string
        targetCents:
          type: integer
        deadline:
          type: string
        frequency:
          type: string
        autoSaveCents:
          type: ["integer", "null"]
        imageUrl:
          type: string

    # ---- Learn ----
    LessonSummary:
      type: object
      required: [slug, title, summary, minutes, level, category, emoji, completed]
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        minutes:
          type: integer
        level:
          type: string
        category:
          type: string
        emoji:
          type: string
        completed:
          type: boolean

    LessonBody:
      type: object
      required: [heading, text]
      properties:
        heading:
          type: string
        text:
          type: string

    LessonDetail:
      type: object
      required: [slug, title, summary, minutes, level, category, emoji, completed, body, takeaways]
      properties:
        slug:
          type: string
        title:
          type: string
        summary:
          type: string
        minutes:
          type: integer
        level:
          type: string
        category:
          type: string
        emoji:
          type: string
        completed:
          type: boolean
        body:
          type: array
          items:
            $ref: "#/components/schemas/LessonBody"
        takeaways:
          type: array
          items:
            type: string

    # ---- Activity ----
    ActivityItem:
      type: object
      required: [id, type, description, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        description:
          type: string
        amountCents:
          type: ["integer", "null"]
        txHash:
          type: ["string", "null"]
        onchainStatus:
          type: string
        createdAt:
          type: string

    # ---- Notifications ----
    Notification:
      type: object
      required: [id, type, title, body, read, createdAt]
      properties:
        id:
          type: string
        type:
          type: string
        title:
          type: string
        body:
          type: string
        link:
          type: ["string", "null"]
        read:
          type: boolean
        createdAt:
          type: string

    NotificationsResponse:
      type: object
      required: [notifications, unreadCount]
      properties:
        notifications:
          type: array
          items:
            $ref: "#/components/schemas/Notification"
        unreadCount:
          type: integer

    # ---- Profile ----
    UserProfile:
      type: object
      required: [id, name, email, walletAddress, createdAt]
      properties:
        id:
          type: string
        name:
          type: string
        email:
          type: string
        username:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        walletAddress:
          type: ["string", "null"]
        referralSource:
          type: ["string", "null"]
        emailVerified:
          type: boolean
        hasPassword:
          type: boolean
        privyLinked:
          type: boolean
        createdAt:
          type: string
        language:
          type: string
          description: Preferred UI language code (e.g. "en", "ar", "fr", "sw", "pcm", "ha", "zh").

    ProfileUpdate:
      type: object
      properties:
        name:
          type: string
        username:
          type: ["string", "null"]
        dateOfBirth:
          type: ["string", "null"]
        nationality:
          type: ["string", "null"]
        avatarUrl:
          type: ["string", "null"]
        language:
          type: string
          enum: [en, ar, fr, sw, pcm, ha, zh]

    # ---- Storage ----
    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
          minLength: 1
        size:
          type: integer
          minimum: 1
        contentType:
          type: string
          minLength: 1
    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
          minLength: 1
        objectPath:
          type: string
        metadata:
          $ref: "#/components/schemas/UploadUrlRequest"

    # ---- Passkeys ----
    PasskeyChallengeResponse:
      type: object
      required: [flowId, options]
      properties:
        flowId:
          type: string
        options:
          type: object
          additionalProperties: true
    PasskeyRegisterVerifyInput:
      type: object
      required: [flowId, response]
      properties:
        flowId:
          type: string
        deviceName:
          type: ["string", "null"]
        response:
          type: object
          additionalProperties: true
    RegisterPasskeyOptionsInput:
      type: object
      properties:
        currentPassword:
          type: ["string", "null"]
          description: Required (step-up) when the account already has a password set.
        twoFactorCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has TOTP 2FA enabled, in
            addition to currentPassword if a password is also set.
        reauthCode:
          type: ["string", "null"]
          description: >-
            Required (step-up) when the account has neither a password nor 2FA.
            Obtain via POST /auth/stepup/request-code.
    PasskeyLoginVerifyInput:
      type: object
      required: [flowId, response]
      properties:
        flowId:
          type: string
        response:
          type: object
          additionalProperties: true
    PasskeySummary:
      type: object
      required: [id, deviceName, createdAt, lastUsedAt]
      properties:
        id:
          type: string
        deviceName:
          type: ["string", "null"]
        createdAt:
          type: string
        lastUsedAt:
          type: ["string", "null"]
    PasskeyListResponse:
      type: object
      required: [passkeys]
      properties:
        passkeys:
          type: array
          items:
            $ref: "#/components/schemas/PasskeySummary"

    # ---- Operations ----
    PlatformBalances:
      type: object
      required: [address, ethWei, ethFormatted, usdcCents, reachable]
      properties:
        address:
          type: ["string", "null"]
        ethWei:
          type: ["string", "null"]
        ethFormatted:
          type: ["string", "null"]
        usdcCents:
          type: ["integer", "null"]
        reachable:
          type: boolean
    SettlementTransfer:
      type: object
      required:
        [id, kind, amountCents, attempts, status, toAddress, memo, lastError, txHash, lastAttemptAt, createdAt, updatedAt]
      properties:
        id:
          type: string
        kind:
          type: string
        amountCents:
          type: integer
        attempts:
          type: integer
        status:
          type: string
        toAddress:
          type: string
        memo:
          type: ["string", "null"]
        lastError:
          type: ["string", "null"]
        txHash:
          type: ["string", "null"]
        lastAttemptAt:
          type: ["string", "null"]
        createdAt:
          type: string
        updatedAt:
          type: string
    SettlementStatusGroup:
      type: object
      required: [status, count, totalAmountCents, transfers]
      properties:
        status:
          type: string
        count:
          type: integer
        totalAmountCents:
          type: integer
        transfers:
          type: array
          items:
            $ref: "#/components/schemas/SettlementTransfer"
    SettlementOverviewResponse:
      type: object
      required: [onchainEnabled, maxAttempts, rowLimit, truncated, platform, groups]
      properties:
        onchainEnabled:
          type: boolean
        maxAttempts:
          type: integer
        rowLimit:
          type: integer
        truncated:
          type: boolean
        platform:
          $ref: "#/components/schemas/PlatformBalances"
        groups:
          type: array
          items:
            $ref: "#/components/schemas/SettlementStatusGroup"
